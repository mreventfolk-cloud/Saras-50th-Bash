<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara's 50th Girls Weekend · Erie PA · July 17-19</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff2d9b;
    --purple: #9b2dff;
    --turquoise: #00e5cc;
    --blue: #2d6cdf;
    --lime: #c6ff3d;
    --ink: #1a0033;
    --paper: #fff9fe;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background-image: repeating-conic-gradient(#2a004a 0% 25%, #1a0033 0% 50%) 0 0 / 28px 28px;
  }

  .page { max-width: 680px; margin: 0 auto; padding: 0 12px 60px; }

  /* HERO */
  .hero { text-align: center; padding: 32px 20px 28px; }
  .hero-logo img { max-width: 280px; width: 100%; height: auto; filter: drop-shadow(0 4px 24px rgba(255,45,155,0.5)); }
  .hero-sub { font-family: 'Space Mono', monospace; color: var(--turquoise); font-size: 0.88rem; margin-bottom: 22px; margin-top: 10px; }
  .countdown { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .chip {
    background: var(--pink); color: #fff; border-radius: 6px;
    padding: 8px 16px; font-family: 'Bungee', cursive;
    font-size: 1.5rem; line-height: 1; min-width: 70px; text-align: center;
  }
  .chip span { display: block; font-family: 'Space Mono', monospace; font-size: 0.6rem; font-weight: 700; color: rgba(255,255,255,0.85); letter-spacing: 0.1em; margin-top: 2px; }

  /* RETRO WINDOW */
  .win {
    background: var(--paper); border: 3px solid var(--ink);
    border-radius: 8px; box-shadow: 5px 5px 0 var(--ink);
    margin-bottom: 18px; overflow: hidden;
  }
  .win-title {
    background: linear-gradient(180deg, #e8e8e8, #b0b0b0);
    border-bottom: 3px solid var(--ink);
    padding: 6px 10px; display: flex; align-items: center; gap: 8px;
  }
  .win-title .dots { display: flex; gap: 4px; }
  .win-title .dot { width: 11px; height: 11px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.25); }
  .dot-pink { background: var(--pink); }
  .dot-lime { background: var(--lime); }
  .dot-blue { background: var(--blue); }
  .win-title .label { font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em; color: #333; flex: 1; }
  .win-title.pink-title { background: linear-gradient(180deg, #ffe3f3, var(--pink)); }
  .win-title.purple-title { background: linear-gradient(180deg, #efe3ff, var(--purple)); }
  .win-title.teal-title { background: linear-gradient(180deg, #d9fffb, var(--turquoise)); }
  .win-title.blue-title { background: linear-gradient(180deg, #dce8ff, var(--blue)); }
  .win-title.lime-title { background: linear-gradient(180deg, #f1ffd6, var(--lime)); }
  .purple-title .label, .blue-title .label { color: #fff; }
  .win-body { padding: 16px; }

  /* DAY TABS */
  .day-tabs {
    display: flex; margin-bottom: 14px;
    border: 3px solid var(--ink); border-radius: 8px;
    overflow: hidden; box-shadow: 4px 4px 0 var(--ink);
  }
  .day-tab {
    flex: 1; padding: 10px 6px;
    font-family: 'Bungee', cursive; font-size: 0.78rem;
    text-align: center; background: #ddd; color: #555;
    cursor: pointer; border: none; border-right: 2px solid var(--ink);
  }
  .day-tab:last-child { border-right: none; }
  .day-tab.active { background: var(--pink); color: #fff; }
  .day-tab span { display: block; font-family: 'Space Mono', monospace; font-size: 0.58rem; font-weight: 700; margin-top: 2px; opacity: 0.85; }
  .day-panel { display: none; }
  .day-panel.active { display: block; }

  /* ITEMS */
  .item { border: 2px solid var(--ink); border-radius: 6px; padding: 12px 14px; margin-bottom: 10px; background: #fff; }
  .item-time { font-family: 'Space Mono', monospace; font-size: 0.72rem; font-weight: 700; color: var(--blue); margin-bottom: 4px; }
  .item h3 { font-family: 'Bungee', cursive; font-size: 0.95rem; color: var(--ink); margin-bottom: 6px; }
  .item p { font-size: 0.88rem; color: #444; line-height: 1.5; }
  .item-address { font-size: 0.8rem; color: #777; font-family: 'Space Mono', monospace; margin-top: 4px; }

  .badge {
    display: inline-block; font-family: 'Space Mono', monospace;
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em;
    padding: 2px 8px; border-radius: 999px; border: 2px solid var(--ink); margin-bottom: 6px;
  }
  .badge-confirmed { background: #00d68f; color: #fff; }
  .badge-canceled { background: #ff4444; color: #fff; }
  .badge-tbd { background: #ff9500; color: #fff; }
  .badge-optional { background: var(--lime); color: var(--ink); }
  .badge-info { background: var(--blue); color: #fff; }

  /* CONFIRMED DETAIL BOXES */
  .confirmed-box {
    background: linear-gradient(135deg, #f0fff8, #e0ffef);
    border: 2px solid #00d68f;
    border-radius: 8px; padding: 14px 16px; margin-bottom: 10px;
  }
  .confirmed-box .cb-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; color: #00a066; margin-bottom: 6px; }
  .confirmed-box h3 { font-family: 'Bungee', cursive; font-size: 1rem; color: var(--ink); margin-bottom: 4px; }
  .confirmed-box p { font-size: 0.88rem; color: #333; line-height: 1.5; }

  .theme-box {
    background: linear-gradient(135deg, #fff0fb, #ffe3f3);
    border: 2px solid var(--pink);
    border-radius: 8px; padding: 14px 16px; margin-bottom: 10px;
  }
  .theme-box .cb-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; color: var(--pink); margin-bottom: 6px; }
  .theme-box h3 { font-family: 'Bungee', cursive; font-size: 1rem; color: var(--ink); margin-bottom: 4px; }
  .theme-box p { font-size: 0.88rem; color: #555; line-height: 1.5; }

  /* VOTE BUTTON */
  .vote-btn {
    display: inline-block; margin-top: 10px;
    background: var(--pink); color: #fff;
    font-family: 'Bungee', cursive; font-size: 0.82rem;
    padding: 8px 18px; border-radius: 6px;
    border: 2px solid var(--ink); box-shadow: 3px 3px 0 var(--ink);
    text-decoration: none;
  }

  /* RESTAURANT LIST */
  .restaurant-list { margin-top: 10px; }
  .restaurant-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #eee; font-size: 0.85rem; }
  .restaurant-item:last-child { border-bottom: none; }
  .restaurant-item.winner { background: #fffbe6; margin: 0 -4px; padding: 7px 4px; border-radius: 4px; font-weight: 600; }
  .winner-star { color: #f5a623; margin-right: 4px; }
  .menu-link { font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--blue); text-decoration: none; white-space: nowrap; margin-left: 8px; flex-shrink: 0; }
  .menu-link:hover { text-decoration: underline; }

  /* THRIFT STOPS */
  .thrift-stops { margin-top: 10px; padding-top: 10px; border-top: 2px dashed #ddd; }
  .thrift-stop { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid #eee; align-items: flex-start; }
  .thrift-stop:last-child { border-bottom: none; }
  .thrift-num { font-family: 'Bungee', cursive; font-size: 1rem; color: var(--pink); min-width: 22px; line-height: 1.2; }
  .thrift-info { flex: 1; }
  .thrift-info strong { font-size: 0.88rem; display: block; }
  .thrift-info .thrift-time { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--blue); }
  .thrift-info .thrift-addr { font-size: 0.75rem; color: #777; }

  /* PHOTO */
  .photo-section {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border: 3px solid var(--ink); border-radius: 8px;
    box-shadow: 5px 5px 0 var(--ink); padding: 24px 20px;
    text-align: center; margin-bottom: 18px;
  }
  .photo-section h2 { font-family: 'Bungee', cursive; color: #fff; font-size: 1.4rem; margin-bottom: 8px; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }
  .photo-section p { color: rgba(255,255,255,0.9); font-size: 0.88rem; margin-bottom: 16px; }
  .photo-btn {
    display: inline-block; background: var(--lime); color: var(--ink);
    font-family: 'Bungee', cursive; font-size: 0.9rem;
    padding: 10px 24px; border-radius: 6px;
    border: 3px solid var(--ink); box-shadow: 3px 3px 0 var(--ink);
    text-decoration: none;
  }

  /* HOTEL */
  .hotel-detail { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; font-size: 0.88rem; }
  .hotel-detail .ic { font-size: 1.1rem; flex-shrink: 0; }

  /* SUNDAY */
  .sunday-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .sunday-opt { border: 2px solid var(--ink); border-radius: 6px; padding: 10px 12px; background: #fff; font-size: 0.85rem; }
  .sunday-opt strong { display: block; font-size: 0.82rem; margin-bottom: 2px; }
  .sunday-opt span { font-size: 0.75rem; color: #777; }

  .note { background: #fff8e1; border-left: 4px solid #ffc107; padding: 10px 12px; font-size: 0.83rem; border-radius: 0 6px 6px 0; margin-top: 10px; }
  .alert { background: #fff0f0; border-left: 4px solid #ff4444; padding: 10px 12px; font-size: 0.83rem; border-radius: 0 6px 6px 0; margin-top: 10px; }
  .section-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #999; margin-bottom: 8px; margin-top: 14px; }
  a { color: var(--blue); }
  footer { text-align: center; padding: 24px 12px; font-family: 'Space Mono', monospace; font-size: 0.72rem; color: rgba(255,255,255,0.4); }

  @media (max-width: 480px) {
    .sunday-grid { grid-template-columns: 1fr; }
    .chip { font-size: 1.2rem; min-width: 60px; padding: 7px 12px; }
    .restaurant-item { flex-direction: column; align-items: flex-start; gap: 2px; }
    .menu-link { margin-left: 0; }
  }
</style>
</head>
